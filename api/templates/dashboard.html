<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predictive Maintenance | Command Center</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #060b19;
            --panel: rgba(16, 28, 55, 0.9);
            --neon-blue: #00d4ff;
            --neon-red: #ff4444;
            --border: #1a3a6d;
        }

        body {
            margin: 0; background: var(--bg); color: var(--neon-blue);
            font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden;
        }

        /* SIDEBAR: INPUT CONTROL PANEL */
        .sidebar {
            width: 300px; height: 100vh; background: var(--panel);
            border-right: 1px solid var(--border); padding: 20px; overflow-y: auto;
        }

        .sidebar h2 { font-size: 1.2rem; color: #fff; border-bottom: 2px solid var(--neon-blue); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #5c7ca0; }
        input { 
            width: 100%; background: #0b1e3b; border: 1px solid var(--border); 
            color: #fff; padding: 8px; border-radius: 4px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; background: transparent; 
            border: 1px solid var(--neon-blue); color: var(--neon-blue);
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        /* MAIN DASHBOARD GRID */
        .main-content {
            flex-grow: 1; padding: 20px; display: grid;
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            grid-gap: 20px; height: 100vh; box-sizing: border-box;
        }

        .panel { 
            background: var(--panel); border: 1px solid var(--border); 
            border-radius: 4px; position: relative; padding: 10px;
        }

        .panel-header { 
            font-size: 0.8rem; color: #5c7ca0; text-transform: uppercase; 
            margin-bottom: 10px; border-bottom: 1px solid var(--border); 
        }

        #alert-status {
            position: absolute; top: 10px; right: 10px; font-weight: bold;
            padding: 2px 10px; border-radius: 20px; font-size: 0.7rem;
        }
        .status-safe { color: #00ff88; border: 1px solid #00ff88; }
        .status-warn { color: var(--neon-red); border: 1px solid var(--neon-red); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Control Panel</h2>
        <div class="input-group">
            <label>Vibration RMS</label>
            <input type="number" id="vibration_rms" value="0.5">
        </div>
        <div class="input-group">
            <label>Motor Temperature</label>
            <input type="number" id="temperature_motor" value="60">
        </div>
        <div class="input-group">
            <label>RPM</label>
            <input type="number" id="rpm" value="1500">
        </div>
        <!-- Add your other inputs here -->
        <button onclick="runPrediction()">Execute Diagnostic</button>
    </div>

    <div class="main-content">
        <!-- TOP LEFT: RISK GAUGES (The Rings) -->
        <div class="panel">
            <div class="panel-header">Failure Probability (Dasbate)</div>
            <div id="alert-status" class="status-safe">NOMINAL</div>
            <div id="ringChart" style="width: 100%; height: 90%;"></div>
        </div>

        <!-- TOP RIGHT: LIVE SENSOR WAVEFORM -->
        <div class="panel">
            <div class="panel-header">Real-Time Waveform Analytics</div>
            <div id="waveChart" style="width: 100%; height: 90%;"></div>
        </div>

        <!-- BOTTOM LEFT: MODEL COMPARISON -->
        <div class="panel">
            <div class="panel-header">Model Performance Overlay</div>
            <div id="modelChart" style="width: 100%; height: 90%;"></div>
        </div>

        <!-- BOTTOM RIGHT: DATASET SUMMARY -->
        <div class="panel">
            <div class="panel-header">Historical Distribution</div>
            <div id="mapChart" style="width: 100%; height: 90%;"></div>
        </div>
    </div>

<script>
    // Initialize ECharts instances
    const ringChart = echarts.init(document.getElementById('ringChart'), 'dark');
    const waveChart = echarts.init(document.getElementById('waveChart'), 'dark');

    // 1. Setup the "Dasbate" style Ring Chart
    const ringOption = {
        backgroundColor: 'transparent',
        series: [{
            type: 'pie', radius: ['60%', '85%'],
            label: { show: true, position: 'center', formatter: '{d}%', fontSize: 30, color: '#fff' },
            data: [
                { value: 0, name: 'Risk', itemStyle: { color: '#00d4ff' } },
                { value: 100, itemStyle: { color: '#1a3a6d' } }
            ]
        }]
    };
    ringChart.setOption(ringOption);

    // 2. Setup the Waveform Chart (similar to bottom of your image)
    const waveOption = {
        backgroundColor: 'transparent',
        xAxis: { type: 'category', boundaryGap: false, show: false },
        yAxis: { splitLine: { show: false }, show: false },
        series: [{
            data: [820, 932, 901, 934, 1290, 1330, 1320],
            type: 'line', smooth: true, areaStyle: { color: 'rgba(0, 212, 255, 0.1)' },
            itemStyle: { color: '#00d4ff' }
        }]
    };
    waveChart.setOption(waveOption);

    // PREDICTION FUNCTION
    async function runPrediction() {
        const payload = {
            features: [
                parseFloat(document.getElementById('vibration_rms').value),
                parseFloat(document.getElementById('temperature_motor').value),
                // Add all other features in order here
            ]
        };

        const response = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        // Update Ring Chart
        const prob = (result.failure_probability * 100).toFixed(2);
        ringChart.setOption({
            series: [{ data: [
                { value: prob, itemStyle: { color: result.alert ? '#ff4444' : '#00d4ff' } },
                { value: 100 - prob, itemStyle: { color: '#1a3a6d' } }
            ]}]
        });

        // Update Alert Status
        const statusDiv = document.getElementById('alert-status');
        statusDiv.innerText = result.alert ? 'CRITICAL FAILURE RISK' : 'NOMINAL';
        statusDiv.className = result.alert ? 'status-warn' : 'status-safe';
    }
</script>
</body>
</html>
